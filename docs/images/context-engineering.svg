<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3fb950"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" rx="16" fill="#0d1117"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" fill="#e6edf3" font-size="22" font-weight="700">Context Engineering: Progressive Disclosure</text>
  <text x="500" y="60" text-anchor="middle" fill="#7d8590" font-size="12">"Find the smallest set of high-signal tokens that maximize the likelihood of your desired outcome" - Anthropic</text>

  <!-- Context Window box -->
  <rect x="40" y="82" width="920" height="130" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="60" y="104" fill="#484f58" font-size="11" font-weight="600" letter-spacing="1">CONTEXT WINDOW</text>

  <!-- Always loaded -->
  <rect x="60" y="116" width="160" height="78" rx="8" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="140" y="140" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">Always loaded</text>
  <text x="140" y="160" text-anchor="middle" fill="#79c0ff" font-size="11">workflow.md</text>
  <text x="140" y="178" text-anchor="middle" fill="#484f58" font-size="10">~120 lines</text>

  <!-- Loaded per-phase -->
  <rect x="240" y="116" width="160" height="78" rx="8" fill="#0d1117" stroke="#3fb950" stroke-width="1.5"/>
  <text x="320" y="140" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="700">Loaded per-phase</text>
  <text x="320" y="160" text-anchor="middle" fill="#7ee787" font-size="11">phase-4-implement.md</text>
  <text x="320" y="178" text-anchor="middle" fill="#484f58" font-size="10">~300 words</text>

  <!-- Loaded on-demand -->
  <rect x="420" y="116" width="160" height="78" rx="8" fill="#0d1117" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="500" y="140" text-anchor="middle" fill="#d2a8ff" font-size="12" font-weight="700">Loaded on-demand</text>
  <text x="500" y="160" text-anchor="middle" fill="#d2a8ff" font-size="11">python-patterns.md</text>
  <text x="500" y="178" text-anchor="middle" fill="#484f58" font-size="10">Only if Python detected</text>

  <!-- Free space -->
  <rect x="600" y="116" width="340" height="78" rx="8" fill="#0d1117" stroke="#484f58" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="770" y="150" text-anchor="middle" fill="#7d8590" font-size="13">Available for your code</text>
  <text x="770" y="170" text-anchor="middle" fill="#7d8590" font-size="13">and conversation</text>

  <!-- Observation Masking Section -->
  <text x="500" y="252" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="700">Observation Masking</text>
  <text x="500" y="274" text-anchor="middle" fill="#7d8590" font-size="12">80%+ of tokens come from tool outputs. Keep them off the main conversation.</text>

  <!-- Main conversation -->
  <rect x="40" y="296" width="400" height="174" rx="12" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <rect x="40" y="296" width="400" height="34" rx="12" fill="#1f6feb" opacity="0.12"/>
  <rect x="40" y="324" width="400" height="6" rx="0" fill="#161b22"/>
  <text x="60" y="318" fill="#58a6ff" font-size="13" font-weight="700">Main Conversation</text>
  <text x="310" y="318" fill="#3fb950" font-size="11" font-weight="600">CLEAN</text>

  <text x="60" y="354" fill="#7d8590" font-size="11" font-family="monospace">Orchestrator: "RESEARCH COMPLETE"</text>
  <text x="60" y="376" fill="#7d8590" font-size="11" font-family="monospace">Orchestrator: "Plan written to disk"</text>
  <text x="60" y="398" fill="#7d8590" font-size="11" font-family="monospace">Implementer: "5/5 tasks done"</text>
  <text x="60" y="420" fill="#7d8590" font-size="11" font-family="monospace">Verifier:    "8 passed, 0 failed"</text>
  <text x="60" y="442" fill="#7d8590" font-size="11" font-family="monospace">Reviewer:    "APPROVED"</text>
  <text x="60" y="460" fill="#3fb950" font-size="10">Compact summaries. Your context stays focused.</text>

  <!-- Arrow -->
  <line x1="460" y1="383" x2="540" y2="383" stroke="#3fb950" stroke-width="2" marker-end="url(#arr4)"/>
  <text x="500" y="374" text-anchor="middle" fill="#3fb950" font-size="10">verbose</text>
  <text x="500" y="398" text-anchor="middle" fill="#3fb950" font-size="10">on disk</text>

  <!-- Filesystem -->
  <rect x="560" y="296" width="400" height="174" rx="12" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <rect x="560" y="296" width="400" height="34" rx="12" fill="#238636" opacity="0.12"/>
  <rect x="560" y="324" width="400" height="6" rx="0" fill="#161b22"/>
  <text x="580" y="318" fill="#3fb950" font-size="13" font-weight="700">Filesystem (Persistent)</text>
  <text x="820" y="318" fill="#ffa657" font-size="11" font-weight="600">FULL DETAILS</text>

  <text x="580" y="352" fill="#484f58" font-size="11" font-family="monospace">docs/plans/0042__plan.md</text>
  <text x="580" y="374" fill="#7d8590" font-size="10" font-family="monospace">  ## Implementation Log</text>
  <text x="580" y="392" fill="#7d8590" font-size="10" font-family="monospace">  ## Task Checklist [x] [x] [x]</text>
  <text x="580" y="410" fill="#7d8590" font-size="10" font-family="monospace">  ## Verification Results</text>
  <text x="580" y="432" fill="#484f58" font-size="11" font-family="monospace">docs/chronicles/0042__chronicle.md</text>
  <text x="580" y="450" fill="#7d8590" font-size="10" font-family="monospace">  ## WHY, discoveries, decisions</text>
  <text x="580" y="464" fill="#ffa657" font-size="10">Everything persists. Staff reviewer reads directly.</text>
</svg>
