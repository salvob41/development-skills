<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="1280" height="640" fill="#0d1117"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="160" x2="1280" y2="160" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1280" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="560" x2="1280" y2="560" stroke="#fff" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="640" stroke="#fff" stroke-width="1"/>
    <line x1="1120" y1="0" x2="1120" y2="640" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Accent glow -->
  <circle cx="640" cy="240" r="300" fill="#1f6feb" opacity="0.04"/>
  <circle cx="640" cy="240" r="150" fill="#8b5cf6" opacity="0.03"/>

  <!-- Plugin name -->
  <text x="640" y="200" text-anchor="middle" fill="#e6edf3" font-size="64" font-weight="800" letter-spacing="-2">development-skills</text>

  <!-- Tagline -->
  <text x="640" y="260" text-anchor="middle" fill="#7d8590" font-size="24">A Claude Code plugin that turns your AI agent</text>
  <text x="640" y="296" text-anchor="middle" fill="#7d8590" font-size="24">into a disciplined software engineer</text>

  <!-- Divider -->
  <line x1="440" y1="330" x2="840" y2="330" stroke="#30363d" stroke-width="2"/>

  <!-- Key features as pills -->
  <g font-size="16" font-weight="600">
    <!-- Row 1 -->
    <rect x="180" y="360" width="180" height="36" rx="18" fill="#1f6feb" opacity="0.2" stroke="#58a6ff" stroke-width="1"/>
    <text x="270" y="383" text-anchor="middle" fill="#58a6ff">7-Phase Workflow</text>

    <rect x="390" y="360" width="180" height="36" rx="18" fill="#238636" opacity="0.2" stroke="#3fb950" stroke-width="1"/>
    <text x="480" y="383" text-anchor="middle" fill="#3fb950">Quality Gates</text>

    <rect x="600" y="360" width="210" height="36" rx="18" fill="#8b5cf6" opacity="0.2" stroke="#d2a8ff" stroke-width="1"/>
    <text x="705" y="383" text-anchor="middle" fill="#d2a8ff">3 Subagents</text>

    <rect x="840" y="360" width="180" height="36" rx="18" fill="#d97706" opacity="0.2" stroke="#ffa657" stroke-width="1"/>
    <text x="930" y="383" text-anchor="middle" fill="#ffa657">5 Languages</text>

    <!-- Row 2 -->
    <rect x="240" y="410" width="160" height="36" rx="18" fill="#da3633" opacity="0.15" stroke="#f85149" stroke-width="1"/>
    <text x="320" y="433" text-anchor="middle" fill="#f85149">TDD Enforced</text>

    <rect x="430" y="410" width="220" height="36" rx="18" fill="#9e6a03" opacity="0.15" stroke="#f0883e" stroke-width="1"/>
    <text x="540" y="433" text-anchor="middle" fill="#f0883e">Brainstorming Guard</text>

    <rect x="680" y="410" width="240" height="36" rx="18" fill="#238636" opacity="0.15" stroke="#3fb950" stroke-width="1"/>
    <text x="800" y="433" text-anchor="middle" fill="#3fb950">Context Engineering</text>
  </g>

  <!-- Stats -->
  <g font-size="18">
    <text x="320" y="510" text-anchor="middle" fill="#e6edf3" font-weight="700" font-size="28">19</text>
    <text x="320" y="536" text-anchor="middle" fill="#7d8590">Skills</text>

    <text x="530" y="510" text-anchor="middle" fill="#e6edf3" font-weight="700" font-size="28">3</text>
    <text x="530" y="536" text-anchor="middle" fill="#7d8590">Subagents</text>

    <text x="740" y="510" text-anchor="middle" fill="#e6edf3" font-weight="700" font-size="28">7</text>
    <text x="740" y="536" text-anchor="middle" fill="#7d8590">Quality Gates</text>

    <text x="950" y="510" text-anchor="middle" fill="#e6edf3" font-weight="700" font-size="28">60k+</text>
    <text x="950" y="536" text-anchor="middle" fill="#7d8590">Lines Tested</text>
  </g>

  <!-- Bottom -->
  <text x="640" y="600" text-anchor="middle" fill="#484f58" font-size="16">github.com/reidemeister94/development-skills</text>
</svg>
